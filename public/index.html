<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EE Graph Studio</title>
  <style>
    @font-face {
      font-family: 'Fields';
      src: url('/fonts/Fields-Regular.otf') format('opentype');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'Fields';
      src: url('/fonts/Fields-SemiBold.otf') format('opentype');
      font-weight: 600;
      font-display: swap;
    }
    @font-face {
      font-family: 'Fields';
      src: url('/fonts/Fields-Bold.otf') format('opentype');
      font-weight: 700;
      font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('/fonts/Inter-VariableFont_slnt,wght.ttf') format('truetype-variations');
      font-weight: 100 900;
      font-display: swap;
    }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <span class="topbar-title">EE Graph Studio</span>
    <span class="topbar-sep"></span>
    <span class="topbar-scenario" id="scenarioTitle">New Scenario</span>
    <div class="topbar-right">
      <button class="fab-btn fab-btn-default fab-btn-sm topbar-btn" id="demoAlloc">Demo Alloc</button>
      <button class="fab-btn fab-btn-default fab-btn-sm topbar-btn" id="demoDecisions">Demo Decisions</button>
      <button class="fab-btn fab-btn-default fab-btn-sm topbar-btn" id="demoSidebar">Demo Sidebar</button>
      <button class="fab-btn fab-btn-default fab-btn-sm topbar-btn" id="zoomFit">Fit</button>

      <!-- Chat position toggle -->
      <div class="chat-toggle" id="chatToggle" title="Toggle chat position">
        <div class="chat-toggle-track">
          <div class="chat-toggle-option" data-mode="sidebar">
            <i class="ph ph-sidebar-simple"></i>
          </div>
          <div class="chat-toggle-option" data-mode="centered">
            <i class="ph ph-command"></i>
          </div>
          <div class="chat-toggle-thumb"></div>
        </div>
      </div>

      <button class="fab-btn fab-btn-default fab-btn-sm topbar-btn topbar-theme-toggle" id="themeToggle">Light</button>
    </div>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="layout">

    <!-- CANVAS -->
    <div class="canvas-area">
      <div class="canvas-viewport" id="viewport">
        <div class="canvas-world" id="world"></div>
      </div>
      <!-- Empty state -->
      <div class="canvas-empty" id="canvasEmpty">
        Ask a question to start exploring
      </div>
    </div>

    <!-- DECISION LOG -->
    <div class="decision-log collapsed" id="decisionLog">
      <div class="dl-header">
        <button class="dl-header-toggle" id="dlToggle" title="Toggle Decision Log">&#9656;</button>
        <span class="dl-header-title">Decision Log</span>
        <span class="dl-header-count" id="dlCount" style="display:none">0</span>
      </div>

      <div class="dl-content" id="dlContent">
        <div class="dl-empty" id="dlEmpty">Decisions will appear here as you explore scenarios</div>
      </div>

      <div class="dl-footer">
        <button class="fab-btn fab-btn-primary fab-btn-block dl-execute" id="dlExecute" disabled>
          Execute Decisions<span class="dl-execute-count" id="dlExecuteCount"></span>
        </button>
      </div>
    </div>

  </div>

  <!-- CONVERSATION (floating over canvas) -->
  <div class="conversation" id="conversation">
    <div class="convo-header">
      <i class="ph-fill ph-sparkle convo-header-icon"></i>
      <span class="convo-header-title">BambooHR Assistant</span>
      <button class="convo-header-close" id="convoClose" title="Close panel"><i class="ph ph-x"></i></button>
    </div>

    <div class="convo-messages" id="messages">
      <!-- Populated by JS on boot -->
    </div>

    <!-- Peek: last AI response (centered mode collapsed state) -->
    <div class="convo-peek" id="convoPeek">
      <div class="convo-peek-text" id="convoPeekText"></div>
      <button class="convo-peek-sidebar" id="convoPeekSidebar" title="Open in sidebar"><i class="ph ph-sidebar-simple"></i></button>
      <div class="convo-peek-btn" id="convoPeekBtn"><i class="ph ph-caret-up" id="convoPeekIcon"></i></div>
    </div>

    <div class="convo-input-area">
      <div class="convo-input-border">
        <div class="convo-input-inner">
          <textarea class="convo-input" id="chatInput" placeholder="Reply..." rows="1"></textarea>
          <button class="convo-send" id="chatSend"><i class="ph-fill ph-arrow-circle-up"></i></button>
        </div>
      </div>
    </div>
  </div>

  <script src="canvas-engine.js"></script>
  <script src="app.js"></script>
  <script src="modes/scenario.js"></script>
  <script>
    Studio.boot();
    // Theme toggle
    const themeBtn = document.getElementById('themeToggle');
    const saved = localStorage.getItem('ee-theme');
    if (saved === 'light') {
      document.documentElement.classList.add('light');
      themeBtn.textContent = 'Dark';
    }
    themeBtn.addEventListener('click', () => {
      const isLight = document.documentElement.classList.toggle('light');
      themeBtn.textContent = isLight ? 'Dark' : 'Light';
      localStorage.setItem('ee-theme', isLight ? 'light' : 'dark');
      document.dispatchEvent(new CustomEvent('themechange', { detail: { light: isLight } }));
    });

    // Chat position toggle (sidebar ↔ centered)
    const chatToggle = document.getElementById('chatToggle');
    const savedChat = localStorage.getItem('ee-chat-mode');
    if (savedChat === 'centered') {
      document.documentElement.classList.add('chat-centered');
      chatToggle.classList.add('chat-toggle-centered');
    }

    function setChatMode(centered) {
      document.documentElement.classList.toggle('chat-centered', centered);
      chatToggle.classList.toggle('chat-toggle-centered', centered);
      localStorage.setItem('ee-chat-mode', centered ? 'centered' : 'sidebar');
      const track = chatToggle.querySelector('.chat-toggle-track');
      track.classList.remove('ring');
      void track.offsetWidth;
      track.classList.add('ring');
      document.dispatchEvent(new CustomEvent('chatlayoutchange', { detail: { centered } }));
      document.getElementById('chatInput').focus();
    }

    chatToggle.addEventListener('click', () => {
      setChatMode(!document.documentElement.classList.contains('chat-centered'));
    });

    // "Open in sidebar" button (centered → sidebar)
    document.getElementById('convoPeekSidebar').addEventListener('click', (e) => {
      e.stopPropagation(); // don't trigger peek expand
      setChatMode(false);
    });

    // "Close panel" button (sidebar → centered)
    document.getElementById('convoClose').addEventListener('click', () => {
      setChatMode(true);
    });

    // Demo Sidebar — inject fake conversation and switch to sidebar mode
    document.getElementById('demoSidebar').addEventListener('click', () => {
      const msgs = document.getElementById('messages');
      const welcome = msgs.querySelector('.convo-welcome');
      if (welcome) welcome.remove();
      msgs.innerHTML = [
        ['user', 'Raj Patel just resigned. What do we need to handle?'],
        ['ai', "Raj's exit creates an immediate management and delivery gap. I'd start with the areas below \u2014 which ones should we dig into?"],
        ['user', "Let's explore: Staffing Gap, Knowledge Transfer, Team Coverage"],
        ['ai', "The immediate issue is management coverage: Raj leaves a 12-person reporting line with a mix of IC-2 and IC-3 engineers. The biggest near-term questions are who absorbs the span, where the team is most junior, and whether a structural split is cleaner than a straight reassignment."],
        ['user', "Who should take over Raj's reports?"],
        ['ai', "Lisa Huang is the safest interim choice \u2014 she's already Raj's manager and knows the team. But absorbing 12 more reports would push her to 14 total. Tom Walsh has 9 reports and overlapping platform context, so a split between Lisa and Tom could work better."],
        ['user', 'Compare Tom directly with Lisa'],
        ['ai', "Lisa is the safer org-stability choice; Tom is the lighter-span alternative but comes with more context switching."],
        ['user', "How should we reorganize Raj Patel's direct reports into Lisa Huang and Tom Walsh groups?"],
        ['ai', "Here's a workable split to explore: Lisa keeps the platform-heavy continuity, while Tom takes a smaller engineer cluster to reduce Lisa\u2019s span jump."],
      ].map(([role, text]) => {
        const el = document.createElement('div');
        el.className = role === 'user' ? 'msg msg-user' : 'msg msg-ai';
        if (role === 'ai') {
          el.innerHTML = '<div class="msg-ai-content">' + text + '</div>';
        } else {
          el.textContent = text;
        }
        return el.outerHTML;
      }).join('');
      setChatMode(false);
      requestAnimationFrame(() => msgs.scrollTop = msgs.scrollHeight);
    });

    // ── Centered chat: peek / expand behavior ──
    (function() {
      const convo = document.getElementById('conversation');
      const msgs = document.getElementById('messages');
      const peek = document.getElementById('convoPeek');
      const peekText = document.getElementById('convoPeekText');
      const peekIcon = document.getElementById('convoPeekIcon');
      let didAutoExpand = false;

      function setExpanded(expanded) {
        // Block collapse when in domain selection mode
        if (!expanded && convo.classList.contains('convo-selecting')) return;
        convo.classList.toggle('convo-expanded', expanded);
        peekIcon.className = expanded ? 'ph ph-caret-down' : 'ph ph-caret-up';
        if (expanded) requestAnimationFrame(() => msgs.scrollTop = msgs.scrollHeight);
      }

      // Watch messages for changes → update peek text + started state
      new MutationObserver(() => {
        const hasWelcome = msgs.querySelector('.convo-welcome');
        const hasMessages = msgs.querySelectorAll('.msg').length > 0;

        if (!hasWelcome && hasMessages) {
          const wasStarted = convo.classList.contains('convo-started');
          convo.classList.add('convo-started');

          // Domain selection mode: proposals visible → lock open, special layout
          const hasProposals = msgs.querySelector('.scenario-proposals');
          const wasSelecting = convo.classList.contains('convo-selecting');
          convo.classList.toggle('convo-selecting', !!hasProposals);
          if (hasProposals && !convo.classList.contains('convo-expanded')) {
            setExpanded(true);
          }
          // Collapse when selection ends (proposals confirmed/removed)
          if (wasSelecting && !hasProposals) {
            setExpanded(false);
          }

          // Scroll to bottom if already expanded
          if (convo.classList.contains('convo-expanded')) {
            requestAnimationFrame(() => msgs.scrollTop = msgs.scrollHeight);
          }
        } else {
          convo.classList.remove('convo-started', 'convo-expanded', 'convo-selecting');
          peekText.textContent = '';
          peekIcon.className = 'ph ph-caret-up';
          didAutoExpand = false;
          return;
        }

        // Peek text: active status wins over stale AI responses
        const statusEl = msgs.querySelector('.msg-status-text');
        const aiMsgs = msgs.querySelectorAll('.msg-ai-content');
        if (statusEl) {
          peekText.textContent = statusEl.textContent;
          peek.classList.add('convo-peek-thinking');
        } else if (aiMsgs.length > 0) {
          peekText.textContent = aiMsgs[aiMsgs.length - 1].textContent.trim().slice(0, 300);
          peek.classList.remove('convo-peek-thinking');
        } else {
          peek.classList.remove('convo-peek-thinking');
        }
      }).observe(msgs, { childList: true, subtree: true, characterData: true });

      // Click peek → toggle expand
      peek.addEventListener('click', () => {
        setExpanded(!convo.classList.contains('convo-expanded'));
      });

      // Escape → collapse
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && convo.classList.contains('convo-expanded')) {
          setExpanded(false);
        }
      });
    })();
  </script>
</body>
</html>
