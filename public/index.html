<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EE Graph Studio</title>
  <style>
    @font-face {
      font-family: 'Fields';
      src: url('/fonts/Fields-Regular.otf') format('opentype');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'Fields';
      src: url('/fonts/Fields-SemiBold.otf') format('opentype');
      font-weight: 600;
      font-display: swap;
    }
    @font-face {
      font-family: 'Fields';
      src: url('/fonts/Fields-Bold.otf') format('opentype');
      font-weight: 700;
      font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('/fonts/Inter-VariableFont_slnt,wght.ttf') format('truetype-variations');
      font-weight: 100 900;
      font-display: swap;
    }
  </style>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <span class="topbar-title">EE Graph Studio</span>
    <span class="topbar-sep"></span>
    <span class="topbar-scenario" id="scenarioTitle">New Scenario</span>
    <div class="topbar-right">
      <button class="topbar-btn" id="zoomFit">Fit</button>
      <button class="topbar-btn topbar-theme-toggle" id="themeToggle">Light</button>
    </div>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="layout">

    <!-- CANVAS -->
    <div class="canvas-area">
      <div class="canvas-viewport" id="viewport">
        <div class="canvas-world" id="world"></div>
      </div>
      <!-- Empty state -->
      <div class="canvas-empty" id="canvasEmpty">
        Ask a question to start exploring
      </div>
    </div>

    <!-- DECISION LOG -->
    <div class="decision-log collapsed" id="decisionLog">
      <div class="dl-header">
        <button class="dl-header-toggle" id="dlToggle" title="Toggle Decision Log">&#9656;</button>
        <span class="dl-header-title">Decision Log</span>
        <span class="dl-header-count" id="dlCount" style="display:none">0</span>
      </div>

      <div class="dl-content" id="dlContent">
        <div class="dl-empty" id="dlEmpty">Decisions will appear here as you explore scenarios</div>
      </div>

      <div class="dl-footer">
        <button class="dl-execute" id="dlExecute" disabled>
          Execute Decisions<span class="dl-execute-count" id="dlExecuteCount"></span>
        </button>
      </div>
    </div>

    <!-- CONVERSATION -->
    <div class="conversation" id="conversation">
      <div class="convo-header">Conversation</div>

      <div class="convo-messages" id="messages">
        <!-- Populated by JS on boot -->
      </div>

      <div class="convo-input-area">
        <div class="convo-input-wrap">
          <input class="convo-input" id="chatInput" placeholder="Ask a question or make a decision..." />
          <button class="convo-send" id="chatSend">&#8593;</button>
        </div>
      </div>
    </div>

  </div>

  <script src="canvas-engine.js"></script>
  <script src="app.js"></script>
  <script src="modes/scenario.js"></script>
  <script>
    Studio.boot();
    // Theme toggle
    const themeBtn = document.getElementById('themeToggle');
    const saved = localStorage.getItem('ee-theme');
    if (saved === 'light') {
      document.documentElement.classList.add('light');
      themeBtn.textContent = 'Dark';
    }
    themeBtn.addEventListener('click', () => {
      const isLight = document.documentElement.classList.toggle('light');
      themeBtn.textContent = isLight ? 'Dark' : 'Light';
      localStorage.setItem('ee-theme', isLight ? 'light' : 'dark');
      document.dispatchEvent(new CustomEvent('themechange', { detail: { light: isLight } }));
    });
  </script>
</body>
</html>
